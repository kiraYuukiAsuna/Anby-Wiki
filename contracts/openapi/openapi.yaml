openapi: 3.1.0
info:
  title: Anby Wiki API
  version: "0.1.0"
  description: |
    Anby Wiki HTTP API 权威契约（OpenAPI 3.1）。
    本文件是所有接口行为的唯一权威定义：错误模型、分页、幂等头与请求 ID 在此统一定义。
    前端客户端由 OpenAPI Generator 从本文件生成，禁止手写 URL/DTO。
    Go 侧 handler 手写实现，由 Contract Test 保证与本文件一致。
  contact:
    name: Anby Wiki
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:8000
    description: 本地 Nginx 网关（推荐，前缀 /api 由网关剥离规则见 infra/nginx）
  - url: http://localhost:8080
    description: 本地直连 Go API
tags:
  - name: meta
    description: 服务元信息与健康检查
  - name: auth
    description: OIDC 浏览器登录与服务端会话
  - name: pages
    description: 页面创建、改名与 Revision 发布（写 API）
  - name: reading
    description: 页面阅读（按标题/别名/ID 读取当前 Revision 与渲染 HTML，匿名可读）
  - name: history
    description: Revision 历史、两版结构 Diff 与回滚（读匿名，回滚需登录）
  - name: projection
    description: 页面与知识/证据关系投影查询（反链、目录、Entity/Claim/Citation 使用位置；匿名可读，最终一致）
  - name: search
    description: 页面搜索（编辑器引用选择器，匿名可读）
  - name: knowledge
    description: Entity、Claim 与 Citation 稳定 ID 详情（匿名只读）
  - name: collections
    description: Manual/Rule Collection 与物化成员查询（匿名只读）
  - name: governance
    description: Proposal、风险审核、预览、原子 Apply 与 ChangeBatch 回滚
  - name: imports
    description: AI 来源导入任务、阶段进度、取消与重试
paths:
  /api/v1/auth/login:
    get:
      operationId: login
      tags: [auth]
      summary: 开始 OIDC Authorization Code + PKCE 登录
      responses:
        "302":
          description: 重定向至身份提供方
          headers:
            Location:
              schema: { type: string, format: uri }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Internal" }
  /api/v1/auth/callback:
    get:
      operationId: callback
      tags: [auth]
      summary: 消费 OIDC callback 并建立服务端 session
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: error
          in: query
          required: false
          schema: { type: string }
      responses:
        "302":
          description: 登录成功，设置 HttpOnly session cookie 并重定向回站内
          headers:
            Location:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Internal" }
  /api/v1/auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: 获取当前登录 Actor
      security:
        - sessionCookie: []
      responses:
        "200":
          description: 当前登录会话
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/Internal" }
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: 吊销当前服务端 session 并清除 cookie
      security:
        - sessionCookie: []
      responses:
        "204":
          description: 已退出；无活动 session 时同样成功
        "500": { $ref: "#/components/responses/Internal" }
  /api/v1/import-jobs:
    post:
      operationId: createImportJob
      tags: [imports]
      summary: 幂等创建来源导入任务
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Idempotency-Key"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateImportJobRequest" }
      responses:
        "201":
          description: 已排队的导入任务
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJob" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/import-jobs/uploads:
    post:
      operationId: createImportUploadJob
      tags: [imports]
      summary: 校验并暂存用户文件，幂等创建来源导入任务
      security:
        - sessionCookie: []
      description: |
        接受最大 10 MiB 的 HTML、纯文本或 PDF。API 在排队前执行 MIME/magic、大小与
        恶意签名检查，并经 Evidence 领域服务写入私有对象存储；Worker 获取后会再次
        校验内容哈希与全部安全门禁。原始内容不写入 ImportJob config 或诊断日志。
      parameters:
        - $ref: "#/components/parameters/Idempotency-Key"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  maxLength: 255
      responses:
        "201":
          description: 已暂存来源并排队的导入任务
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJob" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "503": { $ref: "#/components/responses/Internal" }
  /api/v1/import-jobs/{id}:
    get:
      operationId: getImportJob
      tags: [imports]
      summary: 读取导入任务和各次运行阶段进度
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 导入任务详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJobDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/import-jobs/{id}/cancel:
    post:
      operationId: cancelImportJob
      tags: [imports]
      summary: 取消排队中或运行中的导入任务
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 已取消的任务详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJobDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/import-jobs/{id}/retry:
    post:
      operationId: retryImportJob
      tags: [imports]
      summary: 将失败或已取消任务重新排队
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 已重新排队的任务详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJobDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/proposals:
    post:
      operationId: createProposal
      tags: [governance]
      summary: 幂等创建 Proposal 草稿
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Idempotency-Key"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalRequest"
      responses:
        "201":
          description: Proposal 草稿
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/proposals/{id}:
    get:
      operationId: getProposal
      tags: [governance]
      summary: 读取 Proposal、Operation 与冲突
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: Proposal 详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/proposals/{id}/operations:
    post:
      operationId: addProposalOperation
      tags: [governance]
      summary: 向 draft Proposal 追加 v1 Operation
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalOperationV1"
      responses:
        "201":
          description: 已按服务端序号追加
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalOperationRecord"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/proposals/{id}/submit:
    post:
      operationId: submitProposal
      tags: [governance]
      summary: 提交并执行风险策略
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 自动批准或进入人工队列
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitProposalResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/proposals/{id}/preview:
    get:
      operationId: previewProposal
      tags: [governance]
      summary: 无权威写入地预览 Base、Current 与 Proposed
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 页面 Proposal 三视图、来源与影响范围
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalPreview"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/proposals/{id}/apply:
    post:
      operationId: applyProposal
      tags: [governance]
      summary: 原子应用已批准 Proposal
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: ChangeBatch 与创建的权威版本
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyProposalResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/proposals/{id}/merge-to-working-document:
    post:
      operationId: mergeProposalToWorkingDocument
      tags: [governance]
      summary: 以 sequence CAS 将已验证的 Proposal Yjs delta 合并到工作副本
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeProposalToWorkingDocumentRequest"
      responses:
        "200":
          description: Proposal 已合并到 WorkingDocument
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeProposalToWorkingDocumentResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/proposals/{id}/conflicts/{conflict_id}/resolution:
    post:
      operationId: resolveMergeConflict
      tags: [governance]
      summary: 记录单个 MergeConflict 的人工决议
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
        - name: conflict_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveMergeConflictRequest"
      responses:
        "200":
          description: 更新后的 Proposal；全部冲突解决后恢复 approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Proposal" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/review-tasks:
    get:
      operationId: listReviewTasks
      tags: [governance]
      summary: 人工审核队列
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 待审核任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTaskList"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/review-tasks/{id}/decision:
    post:
      operationId: decideReviewTask
      tags: [governance]
      summary: 人工批准或拒绝 ReviewTask
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: 更新后的 Proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/change-batches/{id}/rollback:
    post:
      operationId: rollbackChangeBatch
      tags: [governance]
      summary: 以新版本补偿回滚 ChangeBatch
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 补偿 Revision/Claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackChangeBatchResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/bulk-review-batches:
    post:
      operationId: createBulkReviewBatch
      tags: [governance]
      summary: 创建并冻结批量风险审核的抽样集合与 Apply wave
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBulkReviewBatchRequest" }
      responses:
        "201":
          description: 独立审核聚合；不创建 ChangeBatch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewBatch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/bulk-review-batches/{id}:
    get:
      operationId: getBulkReviewBatch
      tags: [governance]
      summary: 读取批量审核、Proposal 决策与固定 wave
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 批量审核详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewBatch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/bulk-review-batches/{id}/proposals/{proposal_id}/decision:
    post:
      operationId: decideBulkReviewProposal
      tags: [governance]
      summary: 在批次中批准或拒绝单个 Proposal
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
        - name: proposal_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkReviewDecisionRequest" }
      responses:
        "200":
          description: 更新后的批量审核
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewBatch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/bulk-review-batches/{id}/finalize:
    post:
      operationId: finalizeBulkReviewBatch
      tags: [governance]
      summary: 抽样通过后批准未抽样 Proposal 并冻结审核结果
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 已进入 ready 或全部拒绝后 completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewBatch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/bulk-review-batches/{id}/pause:
    post:
      operationId: pauseBulkReviewBatch
      tags: [governance]
      summary: 暂停后续 Proposal Apply
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 已暂停，固定 wave 不变
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewBatch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/bulk-review-batches/{id}/resume:
    post:
      operationId: resumeBulkReviewBatch
      tags: [governance]
      summary: 恢复后续 Proposal Apply
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 已恢复为 ready
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewBatch" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/bulk-review-batches/{id}/apply-next-wave:
    post:
      operationId: applyNextBulkReviewWave
      tags: [governance]
      summary: 逐 Proposal 调用既有 Apply 边界应用下一固定 wave
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: wave 结果；每个成功项拥有自己的 ChangeBatch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewWaveResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/bulk-review-batches/{id}/audit-events:
    get:
      operationId: listBulkReviewAuditEvents
      tags: [governance]
      summary: 查询批量审核、决策、暂停和 wave Apply 审计
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/GovernanceId"
      responses:
        "200":
          description: 按创建时间排序的审计事件
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkReviewAuditEventList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/pages/search:
    get:
      operationId: searchPages
      summary: 搜索活页面
      description: |
        PostgreSQL FTS SearchAdapter 的匿名查询端点（M7-T01，无需登录）。
        搜索文档由 Outbox 驱动的 Current Revision 投影生成，覆盖标题、旧别名、
        正文和主 Entity 文本；支持字段、命名空间、语言与 Entity 类型过滤。
        高亮使用 [[ 与 ]] 标记，调用方必须按纯文本处理，不能作为 HTML 注入。
        q 为空（trim 后）返回空列表；limit 缺省 10、最大 50。
      tags: [search]
      parameters:
        - name: q
          in: query
          required: false
          description: 查询词（空白裁剪后为空则返回空列表）
          schema:
            type: string
            example: anby
        - name: namespace
          in: query
          required: false
          description: 命名空间 key（缺省 main）
          schema:
            type: string
            default: main
            example: main
        - name: language
          in: query
          required: false
          description: 页面语言精确过滤；缺省不过滤
          schema:
            type: string
            example: zh-Hans
        - name: entity_type
          in: query
          required: false
          description: 页面主 Entity 类型 key 精确过滤；缺省不过滤
          schema:
            type: string
            example: character
        - name: fields
          in: query
          required: false
          description: 搜索字段；缺省搜索全部字段，可重复传递
          schema:
            type: array
            items:
              type: string
              enum: [title, alias, body, entity]
          style: form
          explode: true
        - name: limit
          in: query
          required: false
          description: 返回条数上限（缺省 10，最大 50，超出截断）
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: offset
          in: query
          required: false
          description: 分页偏移量（缺省 0）
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: 搜索结果与命中总数
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageSearchResults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/pages/by-title:
    get:
      operationId: getPageByTitle
      summary: 按标题/别名读取页面当前版本
      description: |
        阅读端点（匿名可读，无需登录）。渲染直连 ContentSnapshot，
        M3 才引入 RenderedPage 投影与缓存。
        标题经服务端规范化（NFC、大小写折叠、空白折叠）后先匹配活页面，再匹配 page_alias：
        - 活页面命中：200 PageWithContent，via_alias=false；
        - 别名命中：200 PageWithContent，via_alias=true 且 alias_title 回显请求标题；
        - 不存在：404 not_found。
        页面是站内重定向源（page_redirect 有行）时跟随到落地页并返回其内容，
        响应带 redirect: {from_page_id, from_title}；重定向环/超过最大跳数返回 422；
        重定向目标已软删除返回 410 gone（资源曾存在、现已删除，语义区别于 404）。
        页面已创建但未发布过时 200 且 content 为 null。
      tags: [reading]
      parameters:
        - name: namespace
          in: query
          required: true
          description: 命名空间 key（如 main）
          schema:
            type: string
            example: main
        - name: title
          in: query
          required: true
          description: 页面标题（服务端规范化后匹配活页面或别名）
          schema:
            type: string
            example: Anby Demara
      responses:
        "200":
          description: 页面元信息 + 当前 Revision 元信息 + AST + 渲染 HTML
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageWithContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/Gone"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/Internal"
