         created_at, idempotent, label_mappings, claim_mappings]
      properties:
        id:
          type: string
          format: uuid
        source_entity_id:
          type: string
          format: uuid
        target_entity_id:
          type: string
          format: uuid
        actor_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [applied, rolled_back]
        reason:
          type: string
        created_at:
          type: string
          format: date-time
        idempotent:
          type: boolean
        label_mappings:
          type: array
          items:
            $ref: "#/components/schemas/EntityMergeLabelMapping"
        claim_mappings:
          type: array
          items:
            $ref: "#/components/schemas/EntityMergeClaimMapping"
    PropertySummary:
      type: object
      required: [id, property_key, name, value_type, is_multivalued, schema]
      properties:
        id:
          type: string
          format: uuid
        property_key:
          type: string
        name:
          type: string
        value_type:
          type: string
        is_multivalued:
          type: boolean
        schema:
          type: object
          additionalProperties: true
    ClaimSource:
      type: object
      required: [citation_id, support_type, created_at]
      properties:
        citation_id:
          type: string
          format: uuid
        support_type:
          type: string
          enum: [supports, contradicts, context]
        created_at:
          type: string
          format: date-time
    ClaimDetail:
      type: object
      required: [id, subject_entity_id, property, value_type, value, target_entity_id, qualifiers, rank, status, verification_status, valid_from, valid_to, origin_type, created_by, created_at, superseded_by, sources]
      properties:
        id:
          type: string
          format: uuid
        subject_entity_id:
          type: string
          format: uuid
        property:
          $ref: "#/components/schemas/PropertySummary"
        value_type:
          type: string
        value:
          description: 按 property.value_type 解释的任意合法 JSON 值
        target_entity_id:
          type: string
          format: uuid
          nullable: true
        qualifiers:
          type: object
          additionalProperties: true
        rank:
          type: string
          enum: [preferred, normal, deprecated]
        status:
          type: string
          enum: [proposed, published, rejected, superseded, deprecated]
        verification_status:
          type: string
          enum: [unverified, ai_checked, human_verified, disputed]
        valid_from:
          type: string
          format: date-time
          nullable: true
        valid_to:
          type: string
          format: date-time
          nullable: true
        origin_type:
          type: string
          enum: [human, ai, import]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        superseded_by:
          type: string
          format: uuid
          nullable: true
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ClaimSource"
    SourceSummary:
      type: object
      required: [id, source_type, title, author, publisher, published_at, metadata]
      properties:
        id:
          type: string
          format: uuid
        source_type:
          type: string
        title:
          type: string
        author:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
    SourceVersionSummary:
      type: object
      required: [id, version_hash, fetched_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        version_hash:
          type: string
        fetched_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    SourceChunk:
      type: object
      required: [id, ordinal, locator, text_content, text_hash]
      properties:
        id:
          type: string
          format: uuid
        ordinal:
          type: integer
        locator:
          type: object
          additionalProperties: true
        text_content:
          type: string
        text_hash:
          type: string
    ExternalResourceSummary:
      type: object
      required: [id, original_url, normalized_url, canonical_url, status]
      properties:
        id:
          type: string
          format: uuid
        original_url:
          type: string
          format: uri
        normalized_url:
          type: string
          format: uri
        canonical_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [unknown, ok, redirect, broken, blocked]
    CitationDetail:
      type: object
      required: [id, source_version_id, source_chunk_id, locator, quotation, quotation_hash, created_by, created_at, source, source_version, source_chunk, external_resource]
      properties:
        id:
          type: string
          format: uuid
        source_version_id:
          type: string
          format: uuid
        source_chunk_id:
          type: string
          format: uuid
          nullable: true
        locator:
          type: object
          nullable: true
          additionalProperties: true
        quotation:
          type: string
          nullable: true
        quotation_hash:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/SourceSummary"
        source_version:
          $ref: "#/components/schemas/SourceVersionSummary"
        source_chunk:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/SourceChunk"
        external_resource:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ExternalResourceSummary"
    PageSearchHit:
      type: object
      required: [id, display_title, namespace, matched_on, highlight, score]
      description: 页面搜索结果条目
      properties:
        id:
          type: string
          format: uuid
          description: 页面 ID（已解析引用的 target_page_id）
        display_title:
          type: string
          description: 页面展示标题（引用 display_text 的默认值）
          example: Anby Demara
        namespace:
          type: string
          description: 页面所在命名空间 key
          example: main
        matched_on:
          type: string
          enum: [title, alias, body, entity]
          description: 最优命中字段
        highlight:
          type: string
          description: 使用 [[ 与 ]] 标记命中词的纯文本片段
          example: A quiet [[swordswoman]] from the Cunning Hares.
        score:
          type: number
          format: float
          description: Adapter 相关性分数；仅用于同一次查询内排序
    PageSearchResults:
      type: object
      required: [items, total]
      description: 页面搜索结果
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PageSearchHit"
        total:
          type: integer
          minimum: 0
          description: 应用分页前的命中总数
    CollectionRule:
      type: object
      required: [version, kind]
      description: Rule Collection v1 判别联合
      properties:
        version:
          type: integer
          enum: [1]
        kind:
          type: string
          enum: [entity_type, claim_exists]
        entity_type:
          type: string
          description: kind=entity_type 时必填，按 EntityType.type_key 匹配
        property:
          type: string
          description: kind=claim_exists 时必填，按 Property.property_key 匹配 published Claim
    Collection:
      type: object
      required: [id, wiki_id, collection_type, title, description_page_id, query, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        wiki_id:
          type: string
          format: uuid
        collection_type:
          type: string
          enum: [manual, rule]
        title:
          type: string
        description_page_id:
          type: string
          format: uuid
          nullable: true
        query:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CollectionRule"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CollectionListPage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          required: [items, next_cursor]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Collection"
            next_cursor:
              type: string
              nullable: true
    CollectionMembership:
      type: object
      required: [member_type, page_id, entity_id, display_title, source_type, sort_key, source_revision_id, created_at]
      properties:
        member_type:
          type: string
          enum: [page, entity]
        page_id:
          type: string
          format: uuid
          nullable: true
        entity_id:
          type: string
          format: uuid
          nullable: true
        display_title:
          type: string
        source_type:
          type: string
          enum: [manual, rule]
        sort_key:
          type: string
        source_revision_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    CollectionMembershipListPage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          required: [items, next_cursor]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CollectionMembership"
            next_cursor:
              type: string
              nullable: true
    Error:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          description: 稳定机器可读错误码
          enum:
            - bad_request
            - unauthorized
            - forbidden
            - not_found
            - gone
            - conflict
            - stale_revision
            - validation_failed
            - rate_limited
            - internal
        message:
          type: string
          description: 面向调用者的错误描述（不泄露内部实现细节）
        request_id:
          type: string
          description: 与响应头 X-Request-ID 一致，用于日志串联
        details:
          type: object
          description: 可选结构化错误明细（如字段级校验错误）
          additionalProperties: true
    CursorPage:
      type: object
      required: [items, next_cursor]
      description: 统一游标分页信封；列表端点以内联 allOf 方式复用
      properties:
        items:
          type: array
          items: {}
        next_cursor:
          type: string
          nullable: true
          description: 下一页游标；null 表示没有更多
    RevisionListPage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          required: [items, next_cursor]
          description: Revision 历史列表（created_at DESC, id DESC 游标分页）
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Revision"
            next_cursor:
              type: string
              nullable: true
              description: 下一页游标；null 表示没有更多
    RevisionDetail:
      type: object
      required: [revision, ast_json]
      description: 单版详情：Revision 元信息 + canonical AST（不含 html）
      properties:
        revision:
          $ref: "#/components/schemas/Revision"
        ast_json:
          type: object
          additionalProperties: true
          description: |
            该 Revision 的 canonical Typed Block AST
            （权威 Schema：contracts/schemas/ast/v1/ast.schema.json）。
    RollbackRequest:
      type: object
      required: [target_revision_id]
      properties:
        target_revision_id:
          type: string
          format: uuid
          description: 回滚目标 Revision ID（必须属于该页面，否则 404）
        summary:
          type: string
          description: 修改摘要；缺省记录「回滚到 {target_revision_id}」
          example: 撤销破坏性编辑
    RollbackResponse:
      allOf:
        - $ref: "#/components/schemas/Revision"
        - type: object
          required: [rolled_back_to]
          description: 回滚产生的新 Revision + 回滚目标
          properties:
            rolled_back_to:
              type: string
              format: uuid
              description: 回滚目标 Revision ID
    FieldChange:
      type: object
      required: [field, before, after]
      description: 单字段 before/after 摘要（值为 canonical JSON 文本，单侧不存在为 "(absent)"）
      properties:
        field:
          type: string
        before:
          type: string
        after:
          type: string
    BlockChange:
      type: object
      required: [type, block_id, parent_id]
      description: |
        一条 Block 级变更。同一 Block 字段与位置都变时产生 changed 与 moved 两条独立条目。
        parent_id 为变更后（added/changed/moved）或变更前（removed）的父 Block ID，顶层为空串。
      properties:
        type:
          type: string
          enum: [added, removed, changed, moved]
        block_id:
          type: string
        parent_id:
          type: string
        path:
          type: array
          items:
            type: integer
          description: 变更后（added）或变更前（removed）的索引路径
        before_path:
          type: array
          items:
            type: integer
          description: 仅 moved：变更前索引路径
        after_path:
          type: array
          items:
            type: integer
          description: 仅 moved：变更后索引路径
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldChange"
          description: 仅 changed：字段级差异（按字段名排序）
    DocumentDiff:
      type: object
      required: [changes]
      description: |
        两版结构 Diff（按 Block ID 对齐 base=from 与 current=to）。
        changes 按 current 前序排列，removed 按 base 前序追加在后，确定性输出；
        from == to 时为空数组。
      properties:
        changes:
          type: array
          items:
            $ref: "#/components/schemas/BlockChange"
  responses:
    BadRequest:
      description: 请求格式错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: 已认证但无权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Gone:
      description: 资源曾存在但已删除（如软删除页面、重定向目标已删除）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: 请求语义可理解但无法处理（如重定向环/重定向链过深）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: 并发冲突（含陈旧基线、幂等键冲突）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Internal:
      description: 服务端内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
