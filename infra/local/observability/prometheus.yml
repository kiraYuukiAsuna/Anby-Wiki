global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: wiki-api
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: wiki-worker
    static_configs:
      - targets:
          - host.docker.internal:9091
