      summary: 两版结构 Diff
      description: |
        阅读端点（匿名可读，无需登录）。以 from 为 base、to 为 current，
        用后端 AST Diff（按 Block ID 对齐）计算结构差异：added/removed/changed/moved。
        from == to 返回空 changes。任一 Revision 不存在或不属于该页面返回 404。
      tags: [history]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: from
          in: query
          required: true
          description: 基线 Revision ID（Diff 的 base 侧）
          schema:
            type: string
            format: uuid
        - name: to
          in: query
          required: true
          description: 目标 Revision ID（Diff 的 current 侧）
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 结构 Diff（changes 确定性排序）
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDiff"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/pages/{id}/rollback:
    post:
      operationId: rollbackPage
      summary: 回滚到历史版本
      description: |
        回滚不是修改旧 Revision（设计 §3.3）：以目标旧版快照内容复用发布事务
        追加一个新 Revision（parent = 当前 current），旧 Revision 与旧快照不动。
        内容 hash 与历史版本相同的快照按 (content_hash, schema_version) 复用，不重复存储。
        summary 缺省记录「回滚到 {target_revision_id}」，可由调用方覆盖。
        审计事件为 revision.rolled_back（payload 含 rolled_back_to）。
        目标 Revision 不属于该页面返回 404；并发语义与发布一致（行锁串行化）。
      tags: [history]
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackRequest"
      responses:
        "201":
          description: 回滚产生的新 Revision（含 rolled_back_to）
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/Internal"
