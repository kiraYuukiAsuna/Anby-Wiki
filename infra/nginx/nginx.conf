# infra/nginx/nginx.conf
# 本地开发网关（docker compose profile: gateway）。
# 反向代理宿主机上的开发进程：
#   /     -> Next.js dev server (host.docker.internal:3000)
#   /api/ -> Go API            (host.docker.internal:8080)
# 经 nginx 访问入口为 http://localhost:8000。

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65s;

    # 默认请求体收紧；导入上传 location 单独放宽到 11 MiB。
    client_max_body_size  2m;

    limit_req_zone $binary_remote_addr zone=general_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_api:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_api:10m rate=3r/m;
    limit_req_status 429;

    map $host $content_security_policy {
        hostnames;
        localhost  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'";
        127.0.0.1  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'";
        default    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests";
    }

    # 空 header 不会发送，因此本地 HTTP 不会收到 HSTS。
    map $https $strict_transport_security {
        default "";
        on      "max-age=31536000; includeSubDomains";
    }

    # ---- gzip ----
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/xml
        image/svg+xml;

    # ---- 安全响应头 ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy $content_security_policy always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;
    add_header Strict-Transport-Security $strict_transport_security always;

    # ---- 代理公共默认值 ----
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_connect_timeout   5s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           16 8k;
    proxy_busy_buffers_size 16k;

    server {
        listen 80;
        server_name _;

        # 上传入口：multipart 边界开销之外，业务层仍执行 10 MiB 内容限制。
        location = /api/v1/import-jobs/uploads {
            client_max_body_size 11m;
            limit_req zone=upload_api burst=2 nodelay;
            proxy_pass http://host.docker.internal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        location /api/v1/auth/ {
            limit_req zone=auth_api burst=5 nodelay;
            proxy_pass http://host.docker.internal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        # WorkingDocument 业务 WebSocket；身份仍只来自服务端 session。
        location ~ ^/api/v1/pages/[^/]+/collaboration$ {
            limit_req zone=general_api burst=20 nodelay;
            proxy_pass http://host.docker.internal:8080;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        # 普通 Go API（宿主机开发进程）
        location /api/ {
            limit_req zone=general_api burst=40 nodelay;
            proxy_pass http://host.docker.internal:8080;
            # 浏览器身份只来自服务端 session cookie，拒绝客户端伪造 Actor。
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        # Next.js dev server（宿主机开发进程）
        # 转发 Upgrade/Connection 以支持 HMR WebSocket
        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s; # HMR WebSocket 长连接
        }
    }

    # Upgrade 头的 Connection 映射（HMR WebSocket）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
