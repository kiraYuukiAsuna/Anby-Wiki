worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    sendfile on;
    keepalive_timeout 65s;
    client_max_body_size 2m;

    limit_req_zone $binary_remote_addr zone=general_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_api:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_api:10m rate=3r/m;
    limit_req_status 429;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 8080;
        server_name _;

        location = /gateway-healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /api/v1/import-jobs/uploads {
            client_max_body_size 11m;
            limit_req zone=upload_api burst=2 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        location /api/v1/auth/ {
            limit_req zone=auth_api burst=5 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        location /api/ {
            limit_req zone=general_api burst=40 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header X-Actor-ID "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Auth-Request-User "";
            proxy_set_header X-Remote-User "";
        }

        location / {
            proxy_pass http://web:3000;
        }
    }
}
