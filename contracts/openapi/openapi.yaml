          $ref: "#/components/responses/Internal"
  /api/v1/collections:
    get:
      operationId: listCollections
      summary: Collection 列表
      description: |
        匿名读取当前 Wiki 的 Manual/Rule Collection，按 title、id 稳定游标分页。
        该端点只读取权威 Collection 定义，不实时执行 Rule。
      tags: [collections]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 一页 Collection
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionListPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/collections/{id}:
    get:
      operationId: getCollection
      summary: Collection 详情
      description: 匿名读取 Collection 定义；Manual 的 query 为 null，Rule 的 query 为 v1 判别联合。
      tags: [collections]
      parameters:
        - $ref: "#/components/parameters/ReferenceTargetId"
      responses:
        "200":
          description: Collection 详情
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/collections/{id}/members:
    get:
      operationId: listCollectionMembers
      summary: Collection 物化成员
      description: |
        匿名读取已物化 Membership，按 sort_key、member_type、target id 稳定游标分页。
        本端点不扫描 AST，也不在请求时执行 Rule。
      tags: [collections]
      parameters:
        - $ref: "#/components/parameters/ReferenceTargetId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 一页物化成员
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionMembershipListPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/entities/{id}/mentions:
    get:
      operationId: listEntityMentions
      summary: Entity 页面提及位置
      description: |
        匿名反向查询 EntityReference 的页面使用位置。只读 entity_mention_projection，
        不扫描 AST JSON；每条结果携带来源 Revision、Block、Node 与 mention_text。
      tags: [projection]
      parameters:
        - $ref: "#/components/parameters/ReferenceTargetId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 一页 Entity 提及位置
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceUsageListPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/claims/{id}/usages:
    get:
      operationId: listClaimUsages
      summary: Claim 页面使用位置
      description: |
        匿名反向查询 ClaimReference 的页面使用位置。只读 claim_usage，不扫描 AST JSON；
        每条结果携带来源 Revision、Block 与 Node。
      tags: [projection]
      parameters:
        - $ref: "#/components/parameters/ReferenceTargetId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 一页 Claim 使用位置
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceUsageListPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /api/v1/citations/{id}/usages:
    get:
      operationId: listCitationUsages
      summary: Citation 页面使用位置
      description: |
        匿名反向查询 CitationReference 的页面使用位置。只读 citation_usage，不扫描 AST JSON；
        每条结果携带来源 Revision、Block、Node 与可选 Claim 上下文。
      tags: [projection]
      parameters:
        - $ref: "#/components/parameters/ReferenceTargetId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 一页 Citation 使用位置
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceUsageListPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
  /healthz:
    get:
      operationId: getHealthz
      summary: 存活探针
      description: 恒 200，仅表示进程存活，不检查任何依赖。
      tags: [meta]
      responses:
        "200":
          description: 进程存活
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      operationId: getReadyz
      summary: 就绪探针
      description: 逐项检查依赖（postgres、redis 等）；任一不可达或未配置返回 503。
      tags: [meta]
      responses:
        "200":
          description: 全部依赖就绪
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: 存在不可达或未配置的依赖
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: anby_session
      description: HttpOnly 同源服务端 session cookie；名称可由部署配置覆盖
  headers:
    X-Request-ID:
      description: 请求 ID；客户端可携带同名请求头，服务端透传或重新生成
      schema:
        type: string
  parameters:
    PageId:
      name: id
      in: path
      required: true
      description: 页面 ID（UUIDv7）
      schema:
        type: string
        format: uuid
    ReferenceTargetId:
      name: id
      in: path
      required: true
      description: Entity、Claim 或 Citation 稳定 ID
      schema:
        type: string
        format: uuid
    GovernanceId:
      name: id
      in: path
      required: true
      description: Proposal、ReviewTask 或 ChangeBatch ID
      schema:
        type: string
        format: uuid
    RevisionId:
      name: rid
      in: path
      required: true
      description: Revision ID（UUIDv7）
      schema:
        type: string
        format: uuid
    Idempotency-Key:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        变更类请求的幂等键（客户端生成的 UUID）。
        服务端对相同 Actor + 幂等键的重复请求返回首次处理结果，不重复执行。
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      description: 上一页响应返回的 next_cursor；首页不传
      schema:
        type: string
    PageSize:
      name: page_size
      in: query
      required: false
      description: 每页条数，默认 20，最大 100
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    AuthSession:
      type: object
      required: [actor_id, actor_type, display_name, method]
      properties:
        actor_id:
          type: string
          format: uuid
        actor_type:
          type: string
        display_name:
          type: string
        method:
          type: string
    CreateImportJobRequest:
      type: object
      required: [config]
      properties:
        job_type:
          type: string
          default: source_import
        config:
          type: object
          additionalProperties: true
    ImportJob:
      type: object
      required: [id, job_type, status, initiated_by, idempotency_key, config, current_stage, progress, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        job_type: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        initiated_by: { type: string, format: uuid }
        idempotency_key: { type: string }
        config: { type: object, additionalProperties: true }
        source_version_id: { type: string, format: uuid, nullable: true }
        proposal_id: { type: string, format: uuid, nullable: true }
        current_stage: { type: string, enum: [queued, fetch, parse, extract, match, compose, review, complete] }
        progress: { type: integer, minimum: 0, maximum: 100 }
        error: { type: object, additionalProperties: true, nullable: true }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }
    ImportRun:
      type: object
      required: [id, import_job_id, attempt, idempotency_key, status, started_at]
      properties:
        id: { type: string, format: uuid }
        import_job_id: { type: string, format: uuid }
        attempt: { type: integer, minimum: 1 }
        idempotency_key: { type: string }
        status: { type: string, enum: [running, succeeded, failed, cancelled] }
        error: { type: object, additionalProperties: true, nullable: true }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
    ImportStageRun:
      type: object
      required: [id, import_run_id, stage, status, started_at]
      properties:
        id: { type: string, format: uuid }
        import_run_id: { type: string, format: uuid }
        stage: { type: string, enum: [fetch, parse, extract, match, compose, review] }
        status: { type: string, enum: [running, succeeded, failed, skipped, cancelled] }
        input_hash: { type: string, nullable: true }
        output_hash: { type: string, nullable: true }
        error: { type: object, additionalProperties: true, nullable: true }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
    ImportJobDetail:
      type: object
      required: [job, runs, stages]
      properties:
        job: { $ref: "#/components/schemas/ImportJob" }
        runs: { type: array, items: { $ref: "#/components/schemas/ImportRun" } }
        stages: { type: array, items: { $ref: "#/components/schemas/ImportStageRun" } }
    CreateProposalRequest:
      type: object
      required: [target_type]
      properties:
        import_job_id: { type: string, format: uuid, nullable: true }
        target_type:
          type: string
          enum: [page, entity, claim, collection, external_resource]
        target_id: { type: string, format: uuid, nullable: true }
        base_revision_id: { type: string, format: uuid, nullable: true }
        base_state_version: { type: integer, minimum: 0, nullable: true }
        risk_level:
          type: string
          enum: [low, medium, high, critical]
    OperationBase:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        revision_id: { type: string, format: uuid }
        state_version: { type: integer, minimum: 0 }
    OperationTarget:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        wiki_id: { type: string, format: uuid }
        namespace_id: { type: string, format: uuid }
        page_id: { type: string, format: uuid }
        block_id: { type: string, minLength: 1 }
        node_id: { type: string, minLength: 1 }
        entity_id: { type: string, format: uuid }
        claim_id: { type: string, format: uuid }
        citation_id: { type: string, format: uuid }
        external_resource_id: { type: string, format: uuid }
    OperationEvidence:
      type: object
      additionalProperties: false
      properties:
        citation_id: { type: string, format: uuid }
        source_chunk_id: { type: string, format: uuid }
        note: { type: string, minLength: 1, maxLength: 1000 }
    OperationRisk:
      type: object
      required: [level, reasons]
      additionalProperties: false
      properties:
        level:
          type: string
          enum: [low, medium, high, critical]
        reasons:
          type: array
          uniqueItems: true
          items: { type: string, minLength: 1 }
    ProposalOperationEnvelope:
      type: object
      required: [schema_version, operation_type, base, target, expected_hash, evidence, risk, payload]
      properties:
        schema_version: { type: integer, enum: [1] }
        operation_type: { type: string }
        base: { $ref: "#/components/schemas/OperationBase" }
        target: { $ref: "#/components/schemas/OperationTarget" }
        expected_hash:
          type: string
          minLength: 64
          maxLength: 64
          pattern: "^[0-9a-f]{64}$"
          nullable: true
        evidence:
          type: array
          items: { $ref: "#/components/schemas/OperationEvidence" }
        risk: { $ref: "#/components/schemas/OperationRisk" }
        payload:
          type: object
          additionalProperties: true
    OperationCreatePage:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [create_page]}}}]
    OperationRenamePage:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [rename_page]}}}]
    OperationCreateRedirect:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [create_redirect]}}}]
    OperationInsertBlock:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [insert_block]}}}]
    OperationDeleteBlock:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [delete_block]}}}]
    OperationMoveBlock:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [move_block]}}}]
    OperationReplaceBlock:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [replace_block]}}}]
    OperationInsertPageReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [insert_page_reference]}}}]
    OperationRetargetPageReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [retarget_page_reference]}}}]
    OperationInsertEntityReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [insert_entity_reference]}}}]
    OperationRetargetEntityReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [retarget_entity_reference]}}}]
    OperationInsertClaimReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [insert_claim_reference]}}}]
    OperationRetargetClaimReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [retarget_claim_reference]}}}]
    OperationInsertCitationReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [insert_citation_reference]}}}]
    OperationRetargetCitationReference:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [retarget_citation_reference]}}}]
    OperationRetargetExternalLink:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [retarget_external_link]}}}]
    OperationCreateEntity:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [create_entity]}}}]
    OperationCreateClaim:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [create_claim]}}}]
    OperationSupersedeClaim:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [supersede_claim]}}}]
    OperationAddClaimSource:
      allOf: [{$ref: "#/components/schemas/ProposalOperationEnvelope"}, {type: object, properties: {operation_type: {type: string, enum: [add_claim_source]}}}]
    ProposalOperationV1:
      discriminator:
        propertyName: operation_type
        mapping:
          create_page: "#/components/schemas/OperationCreatePage"
          rename_page: "#/components/schemas/OperationRenamePage"
          create_redirect: "#/components/schemas/OperationCreateRedirect"
          insert_block: "#/components/schemas/OperationInsertBlock"
          delete_block: "#/components/schemas/OperationDeleteBlock"
          move_block: "#/components/schemas/OperationMoveBlock"
          replace_block: "#/components/schemas/OperationReplaceBlock"
          insert_page_reference: "#/components/schemas/OperationInsertPageReference"
          retarget_page_reference: "#/components/schemas/OperationRetargetPageReference"
          insert_entity_reference: "#/components/schemas/OperationInsertEntityReference"
          retarget_entity_reference: "#/components/schemas/OperationRetargetEntityReference"
          insert_claim_reference: "#/components/schemas/OperationInsertClaimReference"
          retarget_claim_reference: "#/components/schemas/OperationRetargetClaimReference"
          insert_citation_reference: "#/components/schemas/OperationInsertCitationReference"
          retarget_citation_reference: "#/components/schemas/OperationRetargetCitationReference"
          retarget_external_link: "#/components/schemas/OperationRetargetExternalLink"
          create_entity: "#/components/schemas/OperationCreateEntity"
          create_claim: "#/components/schemas/OperationCreateClaim"
          supersede_claim: "#/components/schemas/OperationSupersedeClaim"
          add_claim_source: "#/components/schemas/OperationAddClaimSource"
      oneOf:
        - { $ref: "#/components/schemas/OperationCreatePage" }
        - { $ref: "#/components/schemas/OperationRenamePage" }
        - { $ref: "#/components/schemas/OperationCreateRedirect" }
        - { $ref: "#/components/schemas/OperationInsertBlock" }
        - { $ref: "#/components/schemas/OperationDeleteBlock" }
        - { $ref: "#/components/schemas/OperationMoveBlock" }
        - { $ref: "#/components/schemas/OperationReplaceBlock" }
        - { $ref: "#/components/schemas/OperationInsertPageReference" }
        - { $ref: "#/components/schemas/OperationRetargetPageReference" }
        - { $ref: "#/components/schemas/OperationInsertEntityReference" }
        - { $ref: "#/components/schemas/OperationRetargetEntityReference" }
        - { $ref: "#/components/schemas/OperationInsertClaimReference" }
        - { $ref: "#/components/schemas/OperationRetargetClaimReference" }
        - { $ref: "#/components/schemas/OperationInsertCitationReference" }
        - { $ref: "#/components/schemas/OperationRetargetCitationReference" }
        - { $ref: "#/components/schemas/OperationRetargetExternalLink" }
        - { $ref: "#/components/schemas/OperationCreateEntity" }
        - { $ref: "#/components/schemas/OperationCreateClaim" }
        - { $ref: "#/components/schemas/OperationSupersedeClaim" }
        - { $ref: "#/components/schemas/OperationAddClaimSource" }
    ProposalOperationRecord:
      type: object
      required: [id, sequence, operation]
      properties:
        id: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        operation: { $ref: "#/components/schemas/ProposalOperationV1" }
    MergeConflict:
      type: object
      required: [id, proposal_id, conflict_type, status, created_at]
      properties:
        id: { type: string, format: uuid }
        proposal_id: { type: string, format: uuid }
        page_id: { type: string, format: uuid, nullable: true }
        conflict_type: { type: string, enum: [revision, block_hash, claim_state, semantic] }
        target_block_id: { type: string, nullable: true }
        target_claim_id: { type: string, format: uuid, nullable: true }
        base_revision_id: { type: string, format: uuid, nullable: true }
        current_revision_id: { type: string, format: uuid, nullable: true }
        base_value: { type: object, additionalProperties: true, nullable: true }
        current_value: { type: object, additionalProperties: true, nullable: true }
        proposed_value: { type: object, additionalProperties: true, nullable: true }
        status: { type: string, enum: [open, resolved, dismissed] }
        resolved_by: { type: string, format: uuid, nullable: true }
        resolution: { type: object, additionalProperties: true, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    Proposal:
      type: object
      required: [id, target_type, status, risk_level, risk_reasons, policy_decision, created_by, idempotency_key, created_at, updated_at, operations, conflicts]
      properties:
        id: { type: string, format: uuid }
        import_job_id: { type: string, format: uuid, nullable: true }
        target_type: { type: string, enum: [page, entity, claim, collection, external_resource] }
        target_id: { type: string, format: uuid, nullable: true }
        base_revision_id: { type: string, format: uuid, nullable: true }
        base_state_version: { type: integer, nullable: true }
        status: { type: string, enum: [draft, submitted, in_review, approved, rejected, conflicted, applying, applied, failed, rolled_back] }
        risk_level: { type: string, enum: [low, medium, high, critical] }
        risk_reasons: { type: array, items: { type: string } }
        policy_decision: { type: object, additionalProperties: true }
        created_by: { type: string, format: uuid }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        operations: { type: array, items: { $ref: "#/components/schemas/ProposalOperationRecord" } }
        conflicts: { type: array, items: { $ref: "#/components/schemas/MergeConflict" } }
    PreviewDocument:
      type: object
      required: [revision_id, content_hash, ast]
      properties:
        revision_id: { type: string, format: uuid, nullable: true }
        content_hash: { type: string }
        ast: { type: object, additionalProperties: true }
    PreviewImpact:
      type: object
      required: [operation_count, added_blocks, removed_blocks, changed_blocks, moved_blocks]
      properties:
        operation_count: { type: integer }
        added_blocks: { type: integer }
        removed_blocks: { type: integer }
        changed_blocks: { type: integer }
        moved_blocks: { type: integer }
    ProposalPreview:
      type: object
      required: [proposal_id, target_type, risk_level, stale, base, current, proposed, base_to_current, base_to_proposed, evidence, impact]
      properties:
        proposal_id: { type: string, format: uuid }
        target_type: { type: string }
        risk_level: { type: string, enum: [low, medium, high, critical] }
        stale: { type: boolean }
        base: { $ref: "#/components/schemas/PreviewDocument" }
        current: { $ref: "#/components/schemas/PreviewDocument" }
        proposed: { $ref: "#/components/schemas/PreviewDocument" }
        base_to_current: { $ref: "#/components/schemas/DocumentDiff" }
        base_to_proposed: { $ref: "#/components/schemas/DocumentDiff" }
        evidence: { type: array, items: { $ref: "#/components/schemas/OperationEvidence" } }
        impact: { $ref: "#/components/schemas/PreviewImpact" }
    RiskDecision:
      type: object
      required: [level, reasons, auto_approve, policy]
      properties:
        level: { type: string, enum: [low, medium, high, critical] }
        reasons: { type: array, items: { type: string } }
        auto_approve: { type: boolean }
        policy: { type: string }
    ReviewTask:
      type: object
      required: [id, proposal_id, status, reviewer_id, decision_reason, created_at, reviewed_at]
      properties:
        id: { type: string, format: uuid }
        proposal_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, approved, rejected, cancelled] }
        reviewer_id: { type: string, format: uuid, nullable: true }
        decision_reason: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        reviewed_at: { type: string, format: date-time, nullable: true }
    ReviewTaskList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/ReviewTask" } }
    SubmitProposalResult:
      type: object
      required: [proposal, decision]
      properties:
        proposal: { $ref: "#/components/schemas/Proposal" }
        review_task: { $ref: "#/components/schemas/ReviewTask", nullable: true }
        decision: { $ref: "#/components/schemas/RiskDecision" }
    ReviewDecisionRequest:
      type: object
      required: [approve, reason]
      properties:
        approve: { type: boolean }
        reason: { type: string }
    ApplyProposalResult:
      type: object
      required: [proposal_id, change_batch_id, claim_ids, idempotent]
      properties:
        proposal_id: { type: string, format: uuid }
        change_batch_id: { type: string, format: uuid }
        revision_id: { type: string, format: uuid, nullable: true }
        claim_ids: { type: array, items: { type: string, format: uuid } }
        idempotent: { type: boolean }
    MergeProposalToWorkingDocumentRequest:
      type: object
      required:
        - working_document_id
        - expected_sequence
        - client_id
        - client_update_id
        - current_ast
        - merged_ast
        - update_base64
      properties:
        working_document_id: { type: string, format: uuid }
        expected_sequence: { type: integer, format: int64, minimum: 0 }
        client_id: { type: string, format: uuid }
        client_update_id: { type: string, format: uuid }
        current_ast:
          type: object
          additionalProperties: true
          description: 客户端在 expected_sequence 物化并通过 AST v1 校验的 Current。
        merged_ast:
          type: object
          additionalProperties: true
          description: 客户端按 ProposalOperation 生成并通过 AST v1 校验的 Merged。
        update_base64:
          type: string
          format: byte
          description: 从 Current Y.Doc 到 Merged AST 的 opaque Yjs delta。
    MergeProposalToWorkingDocumentResult:
      type: object
      required:
        - proposal_id
        - change_batch_id
        - document_id
        - sequence
        - idempotent
      properties:
        proposal_id: { type: string, format: uuid }
        change_batch_id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        sequence: { type: integer, format: int64, minimum: 0 }
        idempotent: { type: boolean }
    ResolveMergeConflictRequest:
      type: object
      required: [choice]
      properties:
        choice:
          type: string
          enum: [choose_current, choose_proposed, dismiss]
        reason:
          type: string
          maxLength: 1000
    RollbackChangeBatchResult:
      type: object
      required: [change_batch_id, revision_ids, compensation_claim_ids, idempotent]
      properties:
        change_batch_id: { type: string, format: uuid }
        revision_ids: { type: array, items: { type: string, format: uuid } }
        compensation_claim_ids: { type: array, items: { type: string, format: uuid } }
        idempotent: { type: boolean }
    CreateBulkReviewBatchRequest:
      type: object
      required: [proposal_ids, sample_percent, force_full, wave_size]
      properties:
        proposal_ids:
          type: array
          minItems: 1
          maxItems: 1000
          uniqueItems: true
          items: { type: string, format: uuid }
        sample_percent: { type: integer, minimum: 1, maximum: 100 }
        force_full: { type: boolean }
        wave_size: { type: integer, minimum: 1, maximum: 1000 }
    BulkReviewDecisionRequest:
      type: object
      required: [approve, reason]
      properties:
        approve: { type: boolean }
        reason: { type: string, maxLength: 1000 }
    BulkReviewItem:
      type: object
      required:
        - batch_id
        - proposal_id
        - position
        - wave
        - selected_for_review
        - decision
        - decision_reason
        - reviewed_by
        - reviewed_at
        - apply_status
        - change_batch_id
        - apply_error_code
        - applied_at
      properties:
        batch_id: { type: string, format: uuid }
        proposal_id: { type: string, format: uuid }
        position: { type: integer, minimum: 1 }
        wave: { type: integer, minimum: 1, description: 创建批次时冻结，不随暂停/恢复改变 }
        selected_for_review: { type: boolean }
        decision: { type: string, enum: [pending, approved, rejected] }
        decision_reason: { type: string, nullable: true }
        reviewed_by: { type: string, format: uuid, nullable: true }
        reviewed_at: { type: string, format: date-time, nullable: true }
        apply_status: { type: string, enum: [pending, applied, failed, skipped] }
        change_batch_id:
          type: string
          format: uuid
          nullable: true
          description: 成功 Apply 该 Proposal 后生成的独立 ChangeBatch
        apply_error_code: { type: string, nullable: true }
        applied_at: { type: string, format: date-time, nullable: true }
    BulkReviewBatch:
      type: object
      description: 独立批量审核聚合，不替代或合并 ChangeBatch
      required:
        - id
        - created_by
        - status
        - sampling_mode
        - sample_percent
        - force_full_reason
        - wave_size
        - current_wave
        - created_at
        - finalized_at
        - paused_at
        - completed_at
        - items
      properties:
        id: { type: string, format: uuid }
        created_by: { type: string, format: uuid }
        status: { type: string, enum: [reviewing, ready, applying, paused, completed] }
        sampling_mode: { type: string, enum: [sampled, full] }
        sample_percent: { type: integer, minimum: 1, maximum: 100 }
        force_full_reason:
          type: string
          nullable: true
          enum: [high_or_critical_risk, forced_by_reviewer]
        wave_size: { type: integer, minimum: 1, maximum: 1000 }
        current_wave: { type: integer, minimum: 0 }
        created_at: { type: string, format: date-time }
        finalized_at: { type: string, format: date-time, nullable: true }
        paused_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/BulkReviewItem" }
    BulkReviewWaveResult:
      type: object
      required: [batch_id, wave, status, items]
      properties:
        batch_id: { type: string, format: uuid }
        wave: { type: integer, minimum: 1 }
        status: { type: string, enum: [ready, paused, completed] }
        items:
          type: array
          items: { $ref: "#/components/schemas/BulkReviewItem" }
    BulkReviewAuditEvent:
      type: object
      required: [id, batch_id, actor_id, event_type, proposal_id, wave, payload, created_at]
      properties:
        id: { type: string, format: uuid }
        batch_id: { type: string, format: uuid }
        actor_id: { type: string, format: uuid }
        event_type: { type: string }
        proposal_id: { type: string, format: uuid, nullable: true }
        wave: { type: integer, minimum: 1, nullable: true }
        payload: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    BulkReviewAuditEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/BulkReviewAuditEvent" }
    HealthResponse:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
          example: wiki-api
        version:
          type: string
          example: "0.1.0"
    ReadyResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        checks:
          type: object
          description: "依赖名 → 检查结果（ok / not_configured / error: ...）"
          additionalProperties:
            type: string
          example:
            postgres: ok
            redis: not_configured
    Page:
      type: object
      required:
        - id
        - wiki_id
        - namespace_id
        - normalized_title
        - display_title
        - language
        - content_model
        - status
        - current_revision_id
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        wiki_id:
          type: string
          format: uuid
        namespace_id:
          type: string
          format: uuid
        normalized_title:
          type: string
          description: 规范化标题（路由唯一性键之一）
          example: anby demara
        display_title:
          type: string
          description: 展示标题
          example: Anby Demara
        language:
          type: string
          example: zh-Hans
        content_model:
          type: string
          example: block-v1
        status:
          type: string
          example: active
        current_revision_id:
          type: string
          format: uuid
          nullable: true
          description: 当前 Revision；未发布过为 null
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Revision:
      type: object
      required:
        - id
        - page_id
        - parent_revision_id
        - content_snapshot_id
        - actor_id
        - summary
        - is_minor
        - visibility
        - content_hash
        - schema_version
        - created_at
      properties:
        id:
          type: string
          format: uuid
        page_id:
          type: string
          format: uuid
        parent_revision_id:
          type: string
          format: uuid
          nullable: true
          description: 父 Revision（单父版本链）；首发布为 null
        content_snapshot_id:
          type: string
          format: uuid
        actor_id:
          type: string
          format: uuid
        summary:
          type: string
          description: 修改摘要
        is_minor:
          type: boolean
        visibility:
          type: string
          example: public
        content_hash:
          type: string
          description: SHA-256(CanonicalJSON(AST)) 小写 hex，服务端计算
          example: 3a6eb0790f39ac87c94f3856b2dd2c5d110e6811602261a9a923d3bb50adc8b7
        schema_version:
          type: integer
          description: AST Schema 版本（当前恒为 1）
          example: 1
        created_at:
          type: string
          format: date-time
    CreatePageRequest:
      type: object
      required: [namespace, title]
      properties:
        namespace:
          type: string
          description: 命名空间 key（如 main / talk / user / project / component / collection / file）
          example: main
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Anby Demara
        language:
          type: string
          description: 页面语言，缺省用站点默认语言
          example: zh-Hans
        content_model:
          type: string
          description: 内容模型，缺省 block-v1
          example: block-v1
    RenamePageRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Anby Demara (New)
    PublishRevisionRequest:
      type: object
      required: [ast]
      properties:
        expected_revision_id:
          type: string
          format: uuid
          description: |
            发布基线（乐观锁）：必须等于页面当前 Revision。
            首发布不传（要求页面尚无 Revision）；不一致返回 409 stale_revision。
        working_document_id:
          type: string
          format: uuid
          description: |
            可选的 active WorkingDocument。提供时，发布 Revision 与工作副本换基
            在同一事务完成；文档基线过期时返回 409 stale_revision。
        ast:
          type: object
          additionalProperties: true
          description: |
            Typed Block AST v1 文档（权威 Schema：contracts/schemas/ast/v1/ast.schema.json）。
            必须是 JSON 对象，type='document' 且 schema_version=1。
        summary:
          type: string
          description: 修改摘要
          example: 初版
        is_minor:
          type: boolean
          description: 小修改标志
          default: false
    PageWithContent:
      type: object
      required: [page, content, via_alias]
      description: 阅读端点响应：落地页元信息 + 当前 Revision 内容（渲染直连 ContentSnapshot）
      properties:
        page:
          $ref: "#/components/schemas/Page"
        content:
          nullable: true
          description: 当前 Revision 内容；页面已创建但未发布过为 null
          $ref: "#/components/schemas/PageContent"
        via_alias:
          type: boolean
          description: 是否经由 page_alias（旧标题别名）解析命中
        alias_title:
          type: string
          description: via_alias=true 时回显客户端请求的标题原文
        redirect:
          type: object
          nullable: true
          description: 请求命中站内重定向源时出现；响应返回的是落地页
          required: [from_page_id, from_title]
          properties:
            from_page_id:
              type: string
              format: uuid
              description: 重定向源页面 ID
            from_title:
              type: string
              description: 重定向源页面显示标题
    PageContent:
      type: object
      required: [revision, ast_json, html, renderer_version]
      description: 已发布页面的当前 Revision 内容
      properties:
        revision:
          $ref: "#/components/schemas/Revision"
        ast_json:
          type: object
          additionalProperties: true
          description: |
            当前 Revision 的 canonical Typed Block AST
            （权威 Schema：contracts/schemas/ast/v1/ast.schema.json）。
        html:
          type: string
          description: 由 ast_json 渲染的安全 HTML 片段（不含 html/head；安全规则见 backend/internal/render/README.md）
        renderer_version:
          type: string
          description: 渲染器版本（M3 RenderedPage 投影按此版本判断缓存重建）
          example: v1
    Backlink:
      type: object
      required: [source_page_id, source_title, source_block_id, display_text]
      description: 一条反向链接：指向目标页的已解析引用来源
      properties:
        source_page_id:
          type: string
          format: uuid
          description: 来源页面 ID
        source_title:
          type: string
          description: 来源页面显示标题
          example: Anby Demara
        source_block_id:
          type: string
          format: uuid
          description: 引用所在 Block ID
        display_text:
          type: string
          description: 引用的展示文本
    BacklinkListPage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          required: [items, next_cursor]
          description: 反向链接列表（source_page_id, source_block_id, source_node_id 升序游标分页）
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Backlink"
            next_cursor:
              type: string
              nullable: true
              description: 下一页游标；null 表示没有更多
    OutlineItem:
      type: object
      required: [heading_block_id, parent_heading_block_id, level, title, slug, position_key]
      description: 文档目录条目（heading 层级树的一个节点）
      properties:
        heading_block_id:
          type: string
          format: uuid
          description: Heading Block ID（章节权威身份之一，设计 §9）
        parent_heading_block_id:
          type: string
          format: uuid
          nullable: true
          description: 父 Heading Block ID（按 level 栈推导）；顶层为 null
        level:
          type: integer
          minimum: 1
          maximum: 6
          description: Heading 层级
        title:
          type: string
          description: Heading 纯文本标题
        slug:
          type: string
          description: 章节锚点 slug（展示地址，非权威身份；重复标题加 -2/-3 后缀）
          example: story-2
        position_key:
          type: string
          description: 同级 1 起编号的序号路径
          example: "1.2.3"
    DocumentOutline:
      type: object
      required: [items]
      description: 页面文档目录（按文档顺序；页面未发布过为空数组）
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutlineItem"
    AnchorTarget:
      type: object
      required: [page_id, block_id, current_slug, via_alias, via_redirect]
      description: 当前可导航章节目标；Block ID 是权威身份，slug 只用于展示地址
      properties:
        page_id:
          type: string
          format: uuid
        block_id:
          type: string
          format: uuid
        current_slug:
          type: string
        via_alias:
          type: boolean
          description: 输入 slug 是否命中历史别名
        via_redirect:
          type: boolean
          description: 是否跟随过至少一个 BlockRedirect
    ReferenceUsage:
      type: object
      required: [page_id, page_title, revision_id, block_id, node_id, mention_text, claim_id]
      description: Entity/Claim/Citation 在页面 Current Revision 中的一处引用位置
      properties:
        page_id:
          type: string
          format: uuid
        page_title:
          type: string
        revision_id:
          type: string
          format: uuid
          description: 产生该使用投影的来源 Revision
        block_id:
          type: string
          format: uuid
        node_id:
          type: string
          description: 引用节点在 Block content 内的稳定定位键
        mention_text:
          type: string
          nullable: true
          description: EntityReference 的展示文本；Claim/Citation 使用位置为 null
        claim_id:
          type: string
          format: uuid
          nullable: true
          description: Citation 的可选 Claim 上下文；直接 CitationReference 为 null
    ReferenceUsageListPage:
      allOf:
        - $ref: "#/components/schemas/CursorPage"
        - type: object
          required: [items, next_cursor]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ReferenceUsage"
            next_cursor:
              type: string
              nullable: true
              description: 下一页游标；null 表示没有更多
    EntityTypeSummary:
      type: object
      required: [id, type_key, name]
