  /api/v1/pages/{id}/revisions:
    get:
      operationId: listRevisions
      summary: Revision 历史列表
      description: |
        阅读端点（匿名可读，无需登录）。按 (created_at DESC, id DESC) 游标分页
        列出页面 Revision 元信息（含冗余自快照的 content_hash/schema_version，不含 AST）。
        首页不传 cursor；后续页传上一页响应的 next_cursor；next_cursor 为 null 表示没有更多。
        游标无法解析返回 400 validation_failed；页面不存在返回 404。
      tags: [history]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 一页 Revision 历史
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionListPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
    post:
      operationId: publishRevision
      summary: 发布 Revision
      description: |
        原子发布一个 Revision：校验 AST（Typed Block AST v1，schema_version=1）后，
        在单事务内写入 ContentSnapshot / Revision / 页面当前指针 / AuditEvent / OutboxEvent。
        乐观锁：expected_revision_id 必须等于页面当前 Revision（首发布不传，
        要求页面尚无 Revision）；不一致返回 409 stale_revision。
        content_hash 与 size_bytes 由服务端对 canonical AST 计算，客户端提供的值不被信任。
      tags: [pages]
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRevisionRequest"
      responses:
        "201":
          description: 发布成功的 Revision
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revision"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 并发冲突（陈旧基线 stale_revision）
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: stale_revision
                message: "page: 基线 Revision 已过期: page=… expected=… current=…"
                request_id: 9f1c2ab3d4e5f607
        "500":
          $ref: "#/components/responses/Internal"
